<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Fragment Sender - SIMPLE</title>
  <style>
    body { font-family: sans-serif; width: 400px; padding: 16px; background: #f9f9f9; }
    label { display: block; margin-top: 12px; font-weight: bold; font-size: 13px; }
    input, select, button { width: 100%; padding: 6px; margin-top: 4px; box-sizing: border-box; }
    .controls { display: flex; gap: 8px; margin-top: 12px; }
    .controls button { flex: 1; }
    .status { background: #eef; padding: 8px; border-radius: 4px; margin-top: 12px; font-size: 12px; }
    .fragment-list { max-height: 200px; overflow-y: auto; border: 1px solid #eee; padding: 8px; margin-top: 8px; }
    .fragment-item { padding: 4px 0; }
  </style>
</head>
<body>
  <h3>Fragment Sender - SIMPLE</h3>

  <label>Plataforma</label>
  <select id="platform">
    <option value="chatgpt">ChatGPT</option>
    <option value="gemini">Gemini</option>
  </select>

  <label>Delay (segundos)</label>
  <input type="number" id="delay" value="3" min="1" max="10">

  
<div class="controls">
  <button id="startBtn">▶️ Enviar Todos</button>
  <button id="haltBtn" style="background: #f44336; color: white;">⏹️ HALT</button>
</div>

  </div>

  <div class="status" id="status">Estado: Cargando...</div>

  <div>
    <div style="font-weight: bold; margin-top: 15px;">Fragmentos:</div>
    <div class="fragment-list" id="fragmentList">
      <div style="text-align: center; padding: 20px;">Cargando...</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
