<!-- filepicker.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Seleccionar carpeta</title>
  <style>body { padding: 20px; font-family: sans-serif; }</style>
</head>
<body>
  <h2>Selecciona la carpeta de fragmentos</h2>
  <button id="pick">📂 Seleccionar carpeta</button>
  <p id="status">Haz clic arriba.</p>
  <script>
    document.getElementById('pick').onclick = async () => {
      try {
        const dir = await showDirectoryPicker();
        // Guardar handle en storage temporal
        const handle = await dir.queryPermission({ mode: 'read' });
        if (handle !== 'granted') {
          await dir.requestPermission({ mode: 'read' });
        }
        // Serializar handle (solo posible si se usa chrome.fileSystem)
        // Pero como no podemos serializar DirectoryHandle, usamos un canal
        window.opener.postMessage({ type: 'FOLDER_SELECTED', name: dir.name }, '*');
        window.close();
      } catch (err) {
        if (err.name !== 'AbortError') {
          document.getElementById('status').textContent = 'Error: ' + err.message;
          console.error(err);
        } else {
          window.close();
        }
      }
    };
  </script>
</body>
</html>
